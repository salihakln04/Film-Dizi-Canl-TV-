name: Merge M3U Lists

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requests
        run: pip install requests

      - name: Run merge script
        run: python merge.py

      - name: Commit result
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add filmdizitv.m3u
          git commit -m "auto update m3u" || echo "no changes"
          git push
